name: Deploy to BanaHosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: /
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            .env
            error_log
            **/error_log
            storage/logs/**
            storage/meta-webhooks/**
            storage/smile-design/**
            public/uploads/**
            deploy-backups/**
            docs/**
            .chrome-*/
            _local_preview_*.php
            /*.png
            /*.jpg
            /*.zip
            _live_site/**
            site-root/**
            tools/**
            HANDOFF_*.md
